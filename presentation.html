<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FizzBuzz For Fun Not Profit</title>
<style>
  :root {
    color-scheme: light dark;
    --border: color-mix(in srgb, currentColor 20%, transparent);
    --tile-bg: light-dark(#fff, #24262b);
    --tile-border: light-dark(#d8d8d8, #3a3c42);
    --accent: light-dark(#bf7fff, #a266f0);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    font-family: system-ui, sans-serif;
    font-size: 1.25rem;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.4;
    text-align: center;
  }
  .kicker {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
    margin: 0 0 0.75rem;
  }
  h1 {
    font-size: clamp(2.5rem, 7.5vw, 4.25rem);
    margin: 0;
    line-height: 1.15;
  }
  h1 .accent { color: var(--accent); }
  .byline {
    margin: 1rem 0 0;
    font-size: 1.45rem;
    opacity: 0.75;
  }
  .byline .name {
    font-weight: 700;
    opacity: 1;
  }

  pre {
    margin: 2.5rem 0 0;
    padding: 1.25rem 1.5rem;
    text-align: left;
    background: var(--tile-bg);
    border: 1px solid var(--tile-border);
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    font-size: 1.2rem;
    line-height: 1.55;
    max-width: 32rem;
    overflow-x: auto;
  }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .kw { color: light-dark(#a6320f, #ff9d6c); }
  .str { color: light-dark(#1e6a3f, #7fdf9f); }
  .com { opacity: 0.55; font-style: italic; }

  .caption {
    margin: 0.75rem 0 0;
    font-size: 1.05rem;
    opacity: 0.55;
  }

  .next {
    margin-top: 3rem;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font: inherit;
    font-weight: 600;
    padding: 0.6rem 1.2rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--tile-bg);
    color: inherit;
    text-decoration: none;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .next:hover {
    transform: translateY(-2px);
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  }
  .next svg { width: 1rem; height: 1rem; }
</style>
</head>
<body>
  <h1>FizzBuzz <span class="accent">For Fun</span>, Not Profit</h1>
  <p class="byline">by <span class="name">George Mauer</span></p>

  <pre><code><span class="kw">for</span> (<span class="kw">int</span> i = 1; i &lt;= 100; i++) {
  <span class="kw">if</span> (i % 15 == 0) printf(<span class="str">"FizzBuzz\n"</span>);
  <span class="kw">else if</span> (i % 3 == 0) printf(<span class="str">"Fizz\n"</span>);
  <span class="kw">else if</span> (i % 5 == 0) printf(<span class="str">"Buzz\n"</span>);
  <span class="kw">else</span> printf(<span class="str">"%d\n"</span>, i);
}</code></pre>
  <p class="caption">this is the boring version. we can do so much worse.</p>

  <a class="next" href="index.html?blur">

      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </a>
</body>
</html>
