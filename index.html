<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FizzBuzz Tier List</title>
<style>
  :root {
    color-scheme: light dark;
    --border: color-mix(in srgb, currentColor 20%, transparent);
    --tile-bg: light-dark(#fff, #24262b);
    --tile-border: light-dark(#d8d8d8, #3a3c42);
    --pool-bg: light-dark(#f3f3f3, #1b1c1f);

    --s: light-dark(#ff7f7f, #7a2a2a);
    --a: light-dark(#ffbf7f, #7a4f1e);
    --b: light-dark(#ffdf7f, #7a6a1e);
    --c: light-dark(#bfff7f, #3f5a1e);
    --d: light-dark(#7fdfff, #1e4a5a);
    --f: light-dark(#bf7fff, #3f1e5a);
  }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 72rem;
    margin: 2rem auto;
    padding: 0 1rem 4rem;
    line-height: 1.4;
  }
  h1 { margin-bottom: 0.1rem; }
  .subtitle { opacity: 0.7; margin-top: 0; margin-bottom: 1.5rem; }

  .row {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 0.6rem;
    overflow: hidden;
    min-height: 5.5rem;
  }
  .row-label {
    flex: 0 0 4.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 800;
    color: #1a1a1a;
  }
  .row[data-tier="S"] .row-label { background: var(--s); }
  .row[data-tier="A"] .row-label { background: var(--a); }
  .row[data-tier="B"] .row-label { background: var(--b); }
  .row[data-tier="C"] .row-label { background: var(--c); }
  .row[data-tier="D"] .row-label { background: var(--d); }
  .row[data-tier="F"] .row-label { background: var(--f); }

  .dropzone {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 0.5rem;
    padding: 0.5rem;
    background: var(--tile-bg);
  }
  .dropzone.dragover {
    background: color-mix(in srgb, currentColor 6%, var(--tile-bg));
  }

  #pool {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 1rem;
    background: var(--pool-bg);
    border: 1px dashed var(--border);
    border-radius: 10px;
    min-height: 4.5rem;
    margin-top: 1.75rem;
  }
  #pool::before {
    content: "Unranked";
    flex-basis: 100%;
    font-size: 0.8rem;
    font-weight: 600;
    opacity: 0.55;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tile {
    position: relative;
    width: 8.5rem;
    min-height: 3.6rem;
    padding: 0.4rem 1.5rem 0.4rem 0.55rem;
    border: 1px solid var(--tile-border);
    border-radius: 8px;
    background: var(--tile-bg);
    font-size: 0.78rem;
    line-height: 1.25;
    cursor: grab;
    user-select: none;
    display: flex;
    align-items: center;
    text-align: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .tile:active { cursor: grabbing; }
  .tile.dragging { opacity: 0.35; }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
  .tile .label { flex: 1; }
  .tile .open-link {
    position: absolute;
    right: 0.3rem;
    bottom: 0.25rem;
    width: 1.1rem;
    height: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    color: inherit;
    opacity: 0.45;
    text-decoration: none;
    line-height: 1;
  }
  .tile .open-link:hover {
    opacity: 1;
    background: color-mix(in srgb, currentColor 12%, transparent);
  }
  .tile .open-link svg { width: 0.8rem; height: 0.8rem; display: block; }

  .tile .tooltip {
    position: absolute;
    left: 50%;
    bottom: calc(100% + 0.5rem);
    transform: translateX(-50%) translateY(4px);
    width: max-content;
    max-width: 16rem;
    padding: 0.5rem 0.65rem;
    border-radius: 8px;
    background: light-dark(#1f2023, #f2f2f2);
    color: light-dark(#f2f2f2, #1f2023);
    font-size: 0.72rem;
    line-height: 1.4;
    text-align: left;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.12s ease, transform 0.12s ease;
    z-index: 10;
  }
  .tile .tooltip::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: light-dark(#1f2023, #f2f2f2);
  }
  .tile:hover .tooltip {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
    transition-delay: 0.25s;
  }

  .controls {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.6rem;
  }
  button {
    font: inherit;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--tile-bg);
    cursor: pointer;
  }
  button:hover { background: color-mix(in srgb, currentColor 8%, var(--tile-bg)); }
</style>
</head>
<body>
<h1>FizzBuzz Tier List</h1>
<p class="subtitle">Drag each implementation into a tier. Ranking auto-saves in this browser.</p>

<div id="tiers"></div>
<div id="pool"></div>

<div class="controls">
  <button id="reset">Reset ranking</button>
</div>

<script>
const TIERS = ["S", "A", "B", "C", "D", "F"];

const ITEMS = [
  { id: "hm-typescript", label: "TypeScript Types",  href: "honorable-mentions/index.html#typescript",
    blurb: "FizzBuzz computed entirely in TypeScript's type system — no runtime code, the type checker is the interpreter." },
  { id: "hm-tensorflow", label: "Neural Net (TensorFlow)", href: "honorable-mentions/index.html#tensorflow",
    blurb: "FizzBuzz learned by a neural net trained on binary-encoded numbers instead of programmed with rules." },
  { id: "rockstar",      label: "Rockstar Lyrics",   href: "with-rockstar/index.html",
    blurb: "FizzBuzz as heavy-metal lyrics in Dylan Beattie's Rockstar language, run by its real .NET-CLR-on-WASM interpreter." },
  { id: "css-counters",  label: "CSS Counters",      href: "with-css/css-counters/index.html",
    blurb: "A CSS counter is the loop variable, nth-child(3n)/nth-child(5n) is the modulo, selector specificity is the branch." },
  { id: "css-ol",        label: "CSS ol Markers",    href: "with-css/ol-markers/index.html",
    blurb: "An &lt;ol&gt; does the counting; FizzBuzz comes from a ::before \"Fizz\" meeting an ::after \"Buzz\" — the word is never spelled out." },
  { id: "regex",         label: "One Regex",         href: "with-regex/index.html",
    blurb: "One regular expression with three named groups; a 3-state DFA tracks digit-sum mod 3, flattened into the monster fizz branch." },
  { id: "waves",         label: "Sine Wave Zero-Crossings", href: "with-waves/index.html",
    blurb: "sin(πn/3) and sin(πn/5) hit zero exactly on multiples of 3 and 5 — an animated page draws the curves and fills in the answers as they cross." },
  { id: "cycles",        label: "No Modulo, No If",  href: "with-cycles/index.html",
    blurb: "Two free-running cycles of period 3 and 5 are pulled once per tick; (fizz + buzz) || n does the rest — no modulo, no division, no if." },
  { id: "term-rewriting",label: "Term Rewriting → Clojure", href: "with-term-rewriting/index.html",
    blurb: "C-looking source rewritten by term-rewriting rules into legal EDN, read by the Clojure reader, and evaluated — ported to run in-browser via Scittle." },
  { id: "lambda",        label: "Lambda Calculus",   href: "with-lambda-calculus/demo/index.html",
    blurb: "Nothing but single-argument arrow functions: Church numerals, the Z combinator, and one ~11KB inlined expression." },
  { id: "turing",        label: "Turing Machine",    href: "with-turing-machine/index.html",
    blurb: "A genuine single-tape Turing machine: 34 states, 421 rules, mod 3 via digit-sum, mod 5 via last digit." },
  { id: "x86",           label: "x86 Boot Sector",   href: "with-x86/index.html",
    blurb: "A 512-byte x86 boot sector, no OS — the BIOS jumps straight in and it prints via the teletype interrupt, booted live in a v86 WASM emulator." },
  { id: "circuits",      label: "Bare Circuitry (Verilog)", href: "with-circuits/index.html",
    blurb: "No processor, no clock: 8 input wires, 10 LEDs, 92 logic gates. A 4-bit adder and two gate clouds test divisibility directly on the schematic." },
  { id: "fonts-cheat",   label: "Font ligatures",     href: "with-fonts/demo/ligatures.html",
    blurb: "FizzBuzz as a .ttf: This one is a cheat as it hard codes ligatures." },
  { id: "fonts",         label: "OpenType Font",     href: "with-fonts/demo/opentype.html",
    blurb: "FizzBuzz as a .ttf: GSUB substitution tables run a mod-3 state machine during text layout." },
  { id: "hm-enterprise", label: "Enterprise Edition",href: "honorable-mentions/index.html#enterprise",
    blurb: "The cursed FizzBuzzEnterpriseEdition: abstract factories, strategy patterns, and dependency injection for printing three words." },
  { id: "racket-2d",     label: "Racket 2D Table",   href: "with-racket-2d/index.html",
    blurb: "Racket's 2d language reads a decision table drawn in Unicode box characters and #2dmatch dispatches on it directly." },
];

const STORAGE_KEY = "fizzybuzzy-tier-list";

const tiersEl = document.getElementById("tiers");
const poolEl = document.getElementById("pool");

TIERS.forEach(t => {
  const row = document.createElement("div");
  row.className = "row";
  row.dataset.tier = t;
  row.innerHTML = `<div class="row-label">${t}</div><div class="dropzone" data-tier="${t}"></div>`;
  tiersEl.appendChild(row);
});

function makeTile(item) {
  const el = document.createElement("div");
  el.className = "tile";
  el.draggable = true;
  el.dataset.id = item.id;
  el.innerHTML = `
    <span class="label">${item.label}</span>
    <span class="tooltip">${item.blurb}</span>
    <a class="open-link" href="${item.href}" target="_blank" rel="noopener" draggable="false" title="Open ${item.label} in a new tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>`;
  el.querySelector(".open-link").addEventListener("mousedown", e => e.stopPropagation());
  el.addEventListener("dragstart", e => {
    el.classList.add("dragging");
    e.dataTransfer.setData("text/plain", item.id);
    e.dataTransfer.effectAllowed = "move";
  });
  el.addEventListener("dragend", () => {
    el.classList.remove("dragging");
    save();
  });
  return el;
}

function getDragAfterElement(zone, x, y) {
  const tiles = [...zone.querySelectorAll(".tile:not(.dragging)")];
  let closest = { distance: -Infinity, element: null };
  for (const tile of tiles) {
    const box = tile.getBoundingClientRect();
    const centerX = box.left + box.width / 2;
    const centerY = box.top + box.height / 2;
    // Distance along reading order (row by row, left to right).
    const sameRow = y >= box.top && y <= box.bottom;
    const offset = sameRow ? x - centerX : (y < centerY ? -Infinity : Infinity);
    if (offset < 0 && offset > closest.distance) {
      closest = { distance: offset, element: tile };
    }
  }
  return closest.element;
}

const allZones = [poolEl, ...document.querySelectorAll(".dropzone")];
allZones.forEach(zone => {
  zone.addEventListener("dragover", e => {
    e.preventDefault();
    zone.classList.add("dragover");
    const dragging = document.querySelector(".tile.dragging");
    if (!dragging) return;
    const after = getDragAfterElement(zone, e.clientX, e.clientY);
    if (after == null) {
      zone.appendChild(dragging);
    } else if (after !== dragging) {
      zone.insertBefore(dragging, after);
    }
  });
  zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("dragover");
    save();
  });
});

function save() {
  const state = {};
  document.querySelectorAll(".dropzone").forEach(zone => {
    state[zone.dataset.tier] = [...zone.children].map(t => t.dataset.id);
  });
  state.pool = [...poolEl.children].map(t => t.dataset.id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  const tiles = Object.fromEntries(ITEMS.map(item => [item.id, makeTile(item)]));

  let state = null;
  try { state = raw ? JSON.parse(raw) : null; } catch (e) { state = null; }

  if (!state) {
    ITEMS.forEach(item => poolEl.appendChild(tiles[item.id]));
    return;
  }

  const placed = new Set();
  TIERS.forEach(t => {
    const zone = document.querySelector(`.dropzone[data-tier="${t}"]`);
    (state[t] || []).forEach(id => {
      if (tiles[id]) { zone.appendChild(tiles[id]); placed.add(id); }
    });
  });
  (state.pool || []).forEach(id => {
    if (tiles[id]) { poolEl.appendChild(tiles[id]); placed.add(id); }
  });
  ITEMS.forEach(item => {
    if (!placed.has(item.id)) poolEl.appendChild(tiles[item.id]);
  });
}

document.getElementById("reset").addEventListener("click", () => {
  localStorage.removeItem(STORAGE_KEY);
  poolEl.innerHTML = "";
  document.querySelectorAll(".dropzone").forEach(z => z.innerHTML = "");
  load();
});

load();
</script>
</body>
</html>
